name: Deploy Investment Agent to Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID:   ${{ secrets.GCP_PROJECT_ID }}
  REGION:       europe-west1
  SERVICE_NAME: investment-agent
  REPO:         investment-agent-repo
  IMAGE:        europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/investment-agent-repo/investment-agent

jobs:
  # ─── 1. Tests ──────────────────────────────────────────────────────────────
  test:
    name: Tests Python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Vérifier les imports critiques
        run: |
          python -c "from investment_agent.agent import root_agent; print('✅ root_agent OK')"
          python -c "from investment_agent.tools import get_market_data, get_technical_indicators, get_news_sentiment, get_economic_indicators, calculate_portfolio_allocation, assess_risk_score; print('✅ tools OK')"
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Lancer les tests
        run: pytest tests/test_pipeline.py::test_tools -v --tb=short
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

  # ─── 2. Build & Deploy ─────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write        # Requis pour Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authentification Google Cloud (WIF — sans clé JSON)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configurer Docker → Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build de l'image Docker
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            --file Dockerfile \
            .

      - name: Push vers Artifact Registry
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Déployer sur Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image         ${{ env.IMAGE }}:${{ github.sha }} \
            --region        ${{ env.REGION }} \
            --platform      managed \
            --allow-unauthenticated \
            --port          8080 \
            --memory        1Gi \
            --cpu           1 \
            --min-instances 0 \
            --max-instances 10 \
            --concurrency   80 \
            --timeout       300 \
            --set-secrets   "GOOGLE_API_KEY=GOOGLE_API_KEY:latest" \
            --set-env-vars  "GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }},FRONTEND_URL=${{ secrets.FRONTEND_URL }},PYTHONUNBUFFERED=1"

      - name: Récupérer l'URL du service
        id: get-url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Service déployé sur: $URL"

      - name: Smoke test — Health check
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ steps.get-url.outputs.url }}/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check échoué (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Health check OK (HTTP $STATUS)"

      - name: Smoke test — Endpoint /symbols
        run: |
          curl -s ${{ steps.get-url.outputs.url }}/symbols | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'symbols' in data, 'Clé symbols manquante'
          print('✅ /symbols OK:', data['symbols'][:3], '...')
          "